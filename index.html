<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cookbook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f6;--sur:#fff;--sur2:#f4f2ed;--bdr:#e8e4dc;--bdr2:#d0ccc2;--tx:#1c1a17;--tx2:#6b6560;--tx3:#9c9690;--a:#BA7517;--al:#FAEEDA;--ad:#854F0B;--t:#0F6E56;--p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--r:10px;--rs:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1814;--sur:#232019;--sur2:#2c2820;--bdr:#3a352c;--bdr2:#4d4840;--tx:#f0ede6;--tx2:#a09890;--tx3:#6b6560;--a:#e8981a;--al:#3d2e0a;--ad:#f0b84a;--t:#1D9E75;--p:#7F77DD;--pl:#26215C;--pd:#CECBF6}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:0 1.25rem 3rem}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;border-bottom:1px solid var(--bdr);margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo i{font-size:16px;color:#fff}
.at{font-size:17px;font-weight:600;color:var(--tx)}
.as{font-size:12px;color:var(--tx2)}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nb{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:5px;font-family:inherit}
.nb:hover,.nb.on{background:var(--sur2);color:var(--tx);border-color:var(--bdr2)}
.bdg{background:var(--a);color:#fff;font-size:10px;width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
input,select,textarea{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;font-size:14px;color:var(--tx);font-family:inherit;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--a)}
textarea{resize:vertical}
button{font-family:inherit;cursor:pointer}
.bp{background:var(--a);border:none;border-radius:var(--rs);padding:8px 16px;font-size:14px;color:#fff;font-weight:500}
.bp:hover{background:var(--ad)}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 14px;font-size:14px;color:var(--tx2)}
.bg:hover{background:var(--sur2);color:var(--tx)}
.bt{background:var(--t);border:none;border-radius:var(--rs);padding:7px 14px;font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:5px}
.bt:hover{opacity:.9}
.sb{display:flex;gap:8px;margin-bottom:.875rem}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.875rem}
.pill{background:transparent;border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--tx2);font-family:inherit}
.pill:hover{background:var(--sur2)}
.pill.on{background:var(--al);border-color:var(--a);color:var(--ad)}
.pill.try.on{background:var(--pl);border-color:var(--p);color:var(--pd)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;cursor:pointer}
.card:hover{border-color:var(--bdr2)}
.card.try{border-style:dashed}
.ctag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ad);background:var(--al);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:8px}
.ctag.try{color:var(--pd);background:var(--pl)}
.cn{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:6px;line-height:1.4}
.cm{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:8px}
.stars{color:var(--a)}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2)}
.empty i{font-size:42px;opacity:.25;display:block;margin-bottom:12px}
.back{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:13px;display:flex;align-items:center;gap:5px;margin-bottom:1rem;padding:4px 0;font-family:inherit}
.back:hover{color:var(--tx)}
.dtt{font-size:22px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.3}
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px}
.da{display:flex;gap:6px;flex-shrink:0}
.ib{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2)}
.ib:hover{background:var(--sur2)}
.ib.del:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.dm{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem}
.dmi{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);margin-bottom:8px}
.dcols{display:grid;grid-template-columns:1fr 1.6fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:540px){.dcols{grid-template-columns:1fr}}
.ihdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.utog{display:flex;gap:0;border:1px solid var(--bdr);border-radius:var(--rs);overflow:hidden}
.utb{background:transparent;border:none;padding:3px 9px;font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;font-family:inherit;border-right:1px solid var(--bdr)}
.utb:last-child{border-right:none}
.utb:hover{background:var(--sur2)}
.utb.on{background:var(--al);color:var(--ad)}
.srcl{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--a);text-decoration:none;padding:2px 0}
.srcl:hover{text-decoration:underline}
.ings{list-style:none}
.ings li{font-size:14px;padding:6px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.ings li:last-child{border-bottom:none}
.idot{width:5px;height:5px;border-radius:50%;background:var(--a);margin-top:5px;flex-shrink:0}
.sl{list-style:none}
.sl li{font-size:14px;padding:7px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;gap:10px;line-height:1.55}
.sl li:last-child{border-bottom:none}
.snum{font-size:11px;font-weight:600;color:var(--ad);background:var(--al);min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0}
.nbox{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;font-size:14px;color:var(--tx);line-height:1.65;margin-bottom:1rem;border-left:3px solid var(--a)}
.tbn{background:var(--pl);border-radius:var(--r);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tbn span{font-size:14px;color:var(--pd);display:flex;align-items:center;gap:7px}
.ibox{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.75rem}
.ibt{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.ibs{font-size:12px;color:var(--tx2);margin-bottom:9px}
.ir{display:flex;gap:8px}
.ir input{flex:1}
.imsg{margin-top:7px;font-size:13px;display:flex;align-items:center;gap:5px}
.imsg.ok{color:var(--t)}
.imsg.err{color:#c0392b}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;color:var(--tx3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.fr{margin-bottom:1rem}
.fl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fr textarea{height:80px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:480px){.f2,.f3{grid-template-columns:1fr}}
.ingrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ingrow input:first-child{max-width:100px}
.strow{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.strow textarea{height:64px;flex:1}
.rmv{background:transparent;border:1px solid var(--bdr);border-radius:6px;width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px}
.rmv:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.addb{background:transparent;border:1px dashed var(--bdr);border-radius:var(--rs);padding:7px 12px;font-size:13px;cursor:pointer;color:var(--tx2);width:100%;text-align:left;margin-top:4px;display:flex;align-items:center;gap:5px;font-family:inherit}
.addb:hover{background:var(--sur2)}
.spkr{display:flex;gap:4px}
.sp{font-size:24px;cursor:pointer;color:var(--bdr2)}
.sp.lit{color:var(--a)}
.fac{display:flex;gap:8px;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--bdr);margin-top:1rem}
.trow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--pl);border-radius:var(--rs)}
.trow label{font-size:14px;color:var(--pd);font-weight:500;cursor:pointer}
.trow input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:12px}
.sadd{display:flex;gap:8px;margin-bottom:1rem}
.sadd input{flex:1}
.dhdr{font-size:12px;font-weight:600;color:var(--tx);padding:8px 0 4px;border-bottom:1px solid var(--bdr);margin-bottom:4px;margin-top:.875rem;display:flex;align-items:center;gap:6px}
.dhdr:first-of-type{margin-top:0}
.si{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--rs)}
.si:hover{background:var(--sur2)}
.si input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--a)}
.si-t{flex:1;font-size:14px;color:var(--tx)}
.si.done .si-t{text-decoration:line-through;color:var(--tx2)}
.si-s{font-size:11px;color:var(--tx3);white-space:nowrap}
.di-sel{background:transparent;border:none;font-size:11px;color:var(--tx2);cursor:pointer;font-family:inherit;padding:0;width:auto}
.sdiv{margin:1rem 0 .75rem;border:none;border-top:1px solid var(--bdr)}
.sipb{background:var(--sur2);border-radius:var(--r);padding:1rem;margin-top:1.25rem}
.act-bar{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr);flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 14px;font-size:13px;color:var(--tx);cursor:pointer;font-family:inherit}
.act-btn:hover{background:var(--sur2)}
.act-btn.disc{border-color:#5865F2;color:#5865F2}
.act-btn.disc:hover{background:#EEEFFE}
.pnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.pwl{font-size:16px;font-weight:600;color:var(--tx)}
.pws{font-size:12px;color:var(--tx2);margin-top:1px}
.pnb{display:flex;gap:6px}
.pgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:620px){.pgrid{grid-template-columns:repeat(2,1fr)}}
.pday{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.pday.td{border-color:var(--a)}
.pdh{padding:7px 10px;border-bottom:1px solid var(--bdr)}
.pdn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2)}
.pdd{font-size:13px;font-weight:600;color:var(--tx)}
.pday.td .pdn{color:var(--ad)}
.pday.td .pdd{color:var(--a)}
.pslot{padding:6px 8px;border-bottom:1px solid var(--bdr);min-height:46px}
.pslot:last-child{border-bottom:none}
.pml{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:3px}
.pe{font-size:12px;color:var(--tx3);font-style:italic;cursor:pointer}
.pe:hover{color:var(--tx2)}
.pf{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.pm{font-size:12px;color:var(--tx);line-height:1.35;flex:1;cursor:pointer}
.pm:hover{color:var(--a)}
.pc{background:none;border:none;color:var(--tx3);font-size:12px;cursor:pointer;padding:0;flex-shrink:0;line-height:1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.mod{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--bdr)}
.mt{font-size:15px;font-weight:600;color:var(--tx)}
.mx{background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;line-height:1}
.mb{padding:1rem 1.25rem}
.ml{max-height:240px;overflow-y:auto}
.mi{padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:14px;color:var(--tx);display:flex;align-items:center;gap:8px}
.mi:hover{background:var(--sur2)}
.mc{font-size:10px;color:var(--tx3);background:var(--sur2);padding:1px 6px;border-radius:8px}
.mft{padding:.75rem 1.25rem;border-top:1px solid var(--bdr);display:flex;gap:8px}
.mft input{flex:1}
.cfg-sec{margin-bottom:1.5rem}
.cfg-t{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.cfg-s{font-size:13px;color:var(--tx2);margin-bottom:9px}
.cfg-note{font-size:12px;color:var(--tx2);background:var(--sur2);border-radius:var(--rs);padding:10px 12px;margin-top:8px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>

/* --- dept helpers --- */
function autoDept(n){
  n=(n||"").toLowerCase();
  if(/parsley|cilantro|dill|basil|mint|thyme|spinach|kale|lettuce|broccoli|cauliflower|celery|carrot|onion|shallot|garlic|ginger|pepper|tomato|cucumber|zucchini|squash|potato|mushroom|avocado|lime|lemon|orange|apple|banana|berry|mango|fresh herb/.test(n))return"Produce";
  if(/chicken|beef|pork|lamb|turkey|salmon|tuna|fish|shrimp|seafood|meat|steak|ground|sirloin|chuck|rib|sausage|bacon|ham/.test(n))return"Meat & Seafood";
  if(/milk|butter|cheese|egg|yogurt|cream|mozzarella|parmesan|cheddar|dairy/.test(n))return"Dairy & Eggs";
  if(/frozen/.test(n))return"Frozen";
  if(/bread|tortilla|wrap|roll|bun|pita|naan|bagel|bakery/.test(n))return"Bakery";
  if(/ketchup|mustard|mayo|hot sauce|worcestershire|oyster sauce|fish sauce|hoisin|dressing/.test(n))return"Condiments";
  if(/\bcan\b|canned|diced tomato|tomato sauce|tomato paste|\bbean|lentil|chickpea|jarred/.test(n))return"Canned & Jarred";
  if(/flour|sugar|salt|cumin|paprika|chili|cinnamon|spice|seasoning|rice|pasta|noodle|orzo|breadcrumb|cornstarch|baking|cocoa|chocolate|vanilla|oil|vinegar|soy sauce|broth|stock|coconut milk|honey|maple/.test(n))return"Pantry & Dry Goods";
  return"Other";
}

function fmtList(){
  var by={};DEPTS.forEach(function(d){by[d]=[];});
  S.sh.filter(function(i){return!i.done;}).forEach(function(it){if(!it.dept)it.dept=autoDept(it.text);(by[it.dept]||by["Other"]).push(it);});
  var lines=["Shopping List\n"];
  DEPTS.forEach(function(d){if(!by[d]||!by[d].length)return;lines.push("\n"+(DICONS[d]||"")+" "+d.toUpperCase());by[d].forEach(function(it){lines.push("- "+it.text);});});

}

function normFrac(s){return String(s).replace(/[¼½¾⅓⅔⅛⅜⅝⅞⅕⅖⅗⅘⅙⅚]/g,function(c){return " "+UFRAC[c]+" ";}).replace(/(\d)\s+\/\s+(\d)/g,"$1/$2").replace(/\s+/g," ").trim();}
function parseIngLine(str){

/* --- unit conversion (metric <-> US) --- */
var UNITMAP={cup:"cup",cups:"cup",c:"cup",tbsp:"tbsp",tbsps:"tbsp",tbs:"tbsp",tablespoon:"tbsp",tablespoons:"tbsp",tsp:"tsp",tsps:"tsp",teaspoon:"tsp",teaspoons:"tsp",oz:"oz",ounce:"oz",ounces:"oz","fl oz":"floz","floz":"floz","fluid ounce":"floz","fluid ounces":"floz",lb:"lb",lbs:"lb",pound:"lb",pounds:"lb",g:"g",gram:"g",grams:"g",kg:"kg",kilogram:"kg",kilograms:"kg",ml:"ml",milliliter:"ml",millilitre:"ml",milliliters:"ml",millilitres:"ml",l:"l",liter:"l",litre:"l",liters:"l",litres:"l",pint:"pint",pints:"pint",quart:"quart",quarts:"quart",gallon:"gallon",gallons:"gallon"};
var VOLML={cup:240,tbsp:15,tsp:5,floz:30,pint:473,quart:946,gallon:3785,ml:1,l:1000};
var WTG={oz:28.35,lb:453.6,g:1,kg:1000};
var METRICUNITS={g:1,kg:1,ml:1,l:1};
function parseNum(s){s=String(s).trim();if(s.indexOf(" ")>=0){var p=s.split(/\s+/);return parseNum(p[0])+parseNum(p[1]);}if(s.indexOf("/")>=0){var f=s.split("/");return parseFloat(f[0])/parseFloat(f[1]);}return parseFloat(s);}
function parseQty(q){
  q=String(q||"").trim();var m=q.match(/^(\d+\s+\d+\/\d+|\d+\/\d+|\d+(?:\.\d+)?)\s*([a-zA-Z. ]*)$/);
  if(!m)return null;var n=parseNum(m[1]);if(isNaN(n))return null;
  var rest=m[2].trim().toLowerCase().replace(/\.$/,"");
  var unit=UNITMAP[rest];
  if(!unit){var fw=rest.split(/\s+/)[0];unit=UNITMAP[fw];}
  if(!unit)return null;
  return{num:n,unit:unit};
}
function fracStr(n){
  var whole=Math.floor(n+1e-9),frac=n-whole,e=Math.round(frac*8);
  if(e===8){whole++;e=0;}var num=e,den=8;
  while(num>0&&num%2===0&&den%2===0){num/=2;den/=2;}
  var out="";if(whole>0)out+=whole;if(num>0)out+=(whole>0?" ":"")+num+"/"+den;
  return out||"0";
}
function trimDec(n){return String(Math.round(n*100)/100);}
function toMetric(p){
  if(VOLML[p.unit]){var ml=p.num*VOLML[p.unit];if(ml>=1000)return trimDec(ml/1000)+" L";var rml=ml>=100?Math.round(ml/10)*10:(ml>=20?Math.round(ml/5)*5:Math.round(ml));return rml+" ml";}
  if(WTG[p.unit]){var g=p.num*WTG[p.unit];if(g>=1000)return trimDec(g/1000)+" kg";return(g>=100?Math.round(g/5)*5:Math.round(g))+" g";}
  return null;
}
function toUS(p){
  if(VOLML[p.unit]){var ml=p.num*VOLML[p.unit];if(ml>=216)return fracStr(ml/240)+" cup"+(ml/240>=2?"s":"");if(ml>=14)return fracStr(ml/15)+" tbsp";return fracStr(ml/5)+" tsp";}
  if(WTG[p.unit]){var g=p.num*WTG[p.unit];if(g>=454)return fracStr(g/453.6)+" lb"+(g/453.6>=2?"s":"");return fracStr(g/28.35)+" oz";}
  return null;
}
function convertQty(qty,mode){
  if(mode==="orig"||!qty)return qty;
  var p=parseQty(qty);if(!p)return qty;
  var isMetric=!!METRICUNITS[p.unit];
  var out=null;
  if(mode==="metric")out=isMetric?qty:toMetric(p);
  else if(mode==="us")out=isMetric?toUS(p):qty;
  return out||qty;
}

/* --- paste import (parse copied recipe text) --- */
function cleanLine(s){return s.replace(/^\s*(?:[-*•▪●⁃∙]|\d+[.)]|step\s*\d+[:.)-]?)\s*/i,"").trim();}
function parsePaste(txt){
  var lines=String(txt||"").split(/\r?\n/).map(function(s){return s.trim();}).filter(Boolean);
  var ings=[],steps=[],name="",mode="auto";
  var IH=/^ingredients?\b/i,DH=/^(directions?|instructions?|method|steps|preparation)\b/i,SK=/^(nutrition|notes?|equipment|tips?|you'?ll need|servings?|yield|makes|prep\s*time|cook\s*time|total\s*time|advertisement|jump to)\b/i;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    if(IH.test(ln)){mode="ing";var af=ln.replace(IH,"").trim();if(af)ings.push(cleanLine(af));continue;}
    if(DH.test(ln)){mode="step";var ad=ln.replace(DH,"").trim();if(ad)steps.push(cleanLine(ad));continue;}
    if(SK.test(ln)){mode="skip";continue;}
    var c=cleanLine(ln);if(!c)continue;
    if(mode==="ing")ings.push(c);
    else if(mode==="step")steps.push(c);
    else if(mode==="skip"){}
    else{
      if(!name&&i===0&&!/^[\d\/.]/.test(ln)){name=ln;continue;}
      if(/^[\d\/.¼-¾⅐-⅞]/.test(ln)||parseQty(c))ings.push(c);
      else steps.push(c);
    }
  }
  return{name:name,ingredients:parseIngs(ings),steps:steps};
}
function doPaste(){
  var el=document.getElementById("pt");var txt=el?el.value:"";
  if(!txt.trim()){alert("Paste some recipe text first.");return;}
  var d=colf();S.er=Object.assign({},S.er,d);
  var p=parsePaste(txt);
  if(!p.ingredients.length&&!p.steps.length){S.uo=false;S.um="Couldn't find ingredients or steps in that text. Try including the “Ingredients” and “Directions” headings when you copy.";rnd();return;}
  if(p.ingredients.length)S.er.ingredients=p.ingredients;
  if(p.steps.length)S.er.steps=p.steps;
  if(p.name&&!S.er.name)S.er.name=p.name;
  S.uo=true;S.um="Parsed "+p.ingredients.length+" ingredient(s) and "+p.steps.length+" step(s). Review and save below.";rnd();
}

    cookTime:document.getElementById("fk").value.trim(),
    servings:document.getElementById("fsv").value.trim(),
    tags:document.getElementById("ftg").value.trim(),
    sourceUrl:document.getElementById("fsu").value.trim(),
    rating:parseInt(document.getElementById("frt").value)||0,
    wantToTry:wt?wt.checked:false,
    ingredients:ng,steps:st,
    notes:document.getElementById("fnt").value.trim()
  };
}
function svF(){
  var d=colf();if(!d.name){alert("Please enter a recipe name.");return;}
  if(S.er.id){for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===S.er.id){S.rr[i]=Object.assign({},S.er,d);break;}}S.sel=S.er.id;}
  else{var nr=Object.assign({id:uid()},d);S.rr.push(nr);S.sel=nr.id;}
  S.v="detail";svR();rnd();
}
function dR(id){if(!confirm("Delete this recipe?"))return;S.rr=S.rr.filter(function(r){return r.id!==id;});S.v="list";S.sel=null;svR();rnd();}
function aI(){var d=colf();S.er=Object.assign({},S.er,d);S.er.ingredients.push({qty:"",name:""});rnd();}
function rI(i){var d=colf();S.er=Object.assign({},S.er,d);S.er.ingredients.splice(i,1);if(!S.er.ingredients.length)S.er.ingredients.push({qty:"",name:""});rnd();}
function aS(){var d=colf();S.er=Object.assign({},S.er,d);S.er.steps.push("");rnd();}
function rS(i){var d=colf();S.er=Object.assign({},S.er,d);S.er.steps.splice(i,1);if(!S.er.steps.length)S.er.steps.push("");rnd();}
function aSR(id){
  var r=null;for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===id){r=S.rr[i];break;}}if(!r)return;
  var ng=r.ingredients||[];
  for(var i=0;i<ng.length;i++){var t=[ng[i].qty,ng[i].name].filter(Boolean).join(" ");if(t)S.sh.push({id:uid(),text:t,done:false,src:r.name,dept:autoDept(ng[i].name)});}
  svS();S.v="shop";rnd();
}
function aSI(){var el=document.getElementById("si2");var v=el?el.value.trim():"";if(!v)return;S.sh.push({id:uid(),text:v,done:false,dept:autoDept(v)});el.value="";svS();rnd();}
function tSh(id){for(var i=0;i<S.sh.length;i++){if(S.sh[i].id===id){S.sh[i].done=!S.sh[i].done;break;}}svS();rnd();}
function rSh(id){S.sh=S.sh.filter(function(x){return x.id!==id;});svS();rnd();}
function cDone(){S.sh=S.sh.filter(function(x){return!x.done;});svS();rnd();}
function iSh(){var el=document.getElementById("srs");if(el&&el.value)aSR(el.value);}

ini();
</script>
