<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cookbook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f6;--sur:#fff;--sur2:#f4f2ed;--bdr:#e8e4dc;--bdr2:#d0ccc2;--tx:#1c1a17;--tx2:#6b6560;--tx3:#9c9690;--a:#BA7517;--al:#FAEEDA;--ad:#854F0B;--t:#0F6E56;--tl:#E1F5EE;--td:#085041;--p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--r:10px;--rs:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1814;--sur:#232019;--sur2:#2c2820;--bdr:#3a352c;--bdr2:#4d4840;--tx:#f0ede6;--tx2:#a09890;--tx3:#6b6560;--a:#e8981a;--al:#3d2e0a;--ad:#f0b84a;--t:#1D9E75;--tl:#04342C;--td:#9FE1CB;--p:#7F77DD;--pl:#26215C;--pd:#CECBF6}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:0 1.25rem 3rem}
/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;border-bottom:1px solid var(--bdr);margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo i{font-size:16px;color:#fff}
.app-title{font-size:17px;font-weight:600;color:var(--tx)}
.app-sub{font-size:12px;color:var(--tx2)}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nb{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
.nb:hover{background:var(--sur2);color:var(--tx)}
.nb.on{background:var(--sur2);color:var(--tx);border-color:var(--bdr2)}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--a);color:#fff;font-size:10px;font-weight:600;width:17px;height:17px;border-radius:50%}
/* inputs */
input,select,textarea{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;font-size:14px;color:var(--tx);font-family:inherit;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--a)}
textarea{resize:vertical}
button{font-family:inherit;cursor:pointer}
.bp{background:var(--a);border:none;border-radius:var(--rs);padding:8px 18px;font-size:14px;color:#fff;font-weight:500;transition:background .15s}
.bp:hover{background:var(--ad)}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 14px;font-size:14px;color:var(--tx2);transition:background .15s}
.bg:hover{background:var(--sur2);color:var(--tx)}
.bt{background:var(--t);border:none;border-radius:var(--rs);padding:7px 14px;font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:5px}
.bt:hover{background:var(--td)}
/* recipe list */
.sb{display:flex;gap:8px;margin-bottom:1rem}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pill{background:transparent;border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--tx2);transition:all .15s;font-family:inherit}
.pill:hover{background:var(--sur2)}
.pill.on{background:var(--al);border-color:var(--a);color:var(--ad)}
.pill.try.on{background:var(--pl);border-color:var(--p);color:var(--pd)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.try{border-style:dashed}
.ctag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ad);background:var(--al);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:8px}
.ctag.try{color:var(--pd);background:var(--pl)}
.cname{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:6px;line-height:1.4}
.cmeta{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:8px}
.stars{color:var(--a)}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2)}
.empty i{font-size:42px;opacity:.25;display:block;margin-bottom:12px}
/* detail */
.back{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:13px;display:flex;align-items:center;gap:5px;margin-bottom:1rem;padding:4px 0;font-family:inherit}
.back:hover{color:var(--tx)}
.dtitle{font-size:22px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.3}
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px}
.dacts{display:flex;gap:6px;flex-shrink:0}
.ib{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:all .15s}
.ib:hover{background:var(--sur2)}
.ib.del:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.dmeta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem}
.dmi{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);margin-bottom:8px}
.dcols{display:grid;grid-template-columns:1fr 1.6fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:540px){.dcols{grid-template-columns:1fr}}
.ings{list-style:none}
.ings li{font-size:14px;padding:6px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.ings li:last-child{border-bottom:none}
.idot{width:5px;height:5px;border-radius:50%;background:var(--a);margin-top:5px;flex-shrink:0}
.sl{list-style:none}
.sl li{font-size:14px;padding:7px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;gap:10px;line-height:1.55}
.sl li:last-child{border-bottom:none}
.sn{font-size:11px;font-weight:600;color:var(--ad);background:var(--al);min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0}
.nbox{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;font-size:14px;color:var(--tx);line-height:1.65;margin-bottom:1rem;border-left:3px solid var(--a)}
.tbanner{background:var(--pl);border-radius:var(--r);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tbanner span{font-size:14px;color:var(--pd);display:flex;align-items:center;gap:7px}
/* import boxes */
.import-section{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.ibox{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem 1.25rem}
.ibox-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.ibox-sub{font-size:12px;color:var(--tx2);margin-bottom:10px}
.irow{display:flex;gap:8px}
.irow input{flex:1}
.istatus{margin-top:8px;font-size:13px;display:flex;align-items:center;gap:6px}
.istatus.ok{color:var(--t)}
.istatus.err{color:#c0392b}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;color:var(--tx3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
/* form */
.fr{margin-bottom:1rem}
.fl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fr textarea{height:80px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:480px){.f2,.f3{grid-template-columns:1fr}}
.ingrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ingrow input:first-child{max-width:100px}
.strow{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.strow textarea{height:64px;flex:1}
.rmv{background:transparent;border:1px solid var(--bdr);border-radius:6px;width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:all .15s}
.rmv:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.addb{background:transparent;border:1px dashed var(--bdr);border-radius:var(--rs);padding:7px 12px;font-size:13px;cursor:pointer;color:var(--tx2);width:100%;text-align:left;margin-top:4px;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.addb:hover{background:var(--sur2)}
.spkr{display:flex;gap:4px}
.sp{font-size:24px;cursor:pointer;color:var(--bdr2);transition:color .1s}
.sp.lit{color:var(--a)}
.facts{display:flex;gap:8px;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--bdr);margin-top:1rem}
.trow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--pl);border-radius:var(--rs)}
.trow label{font-size:14px;color:var(--pd);font-weight:500;cursor:pointer}
.trow input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer}
/* shopping */
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:12px}
.sadd{display:flex;gap:8px;margin-bottom:1rem}
.sadd input{flex:1}
.sstitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);margin-bottom:8px}
.si{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);transition:background .1s}
.si:hover{background:var(--sur2)}
.si input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--a);flex-shrink:0}
.si-t{flex:1;font-size:14px;color:var(--tx)}
.si.done .si-t{text-decoration:line-through;color:var(--tx2)}
.si-s{font-size:11px;color:var(--tx3);white-space:nowrap}
.sdiv{margin:1rem 0 .75rem;border:none;border-top:1px solid var(--bdr)}
.sipbox{background:var(--sur2);border-radius:var(--r);padding:1rem;margin-top:1.25rem}
/* meal plan */
.pnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.pwl{font-size:16px;font-weight:600;color:var(--tx)}
.pws{font-size:12px;color:var(--tx2);margin-top:1px}
.pnb{display:flex;gap:6px}
.pgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:620px){.pgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:380px){.pgrid{grid-template-columns:1fr}}
.pday{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.pday.td{border-color:var(--a)}
.pdh{padding:8px 10px;border-bottom:1px solid var(--bdr)}
.pdn{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2)}
.pdd{font-size:13px;font-weight:600;color:var(--tx)}
.pday.td .pdn{color:var(--ad)}
.pday.td .pdd{color:var(--a)}
.pslot{padding:6px 8px;border-bottom:1px solid var(--bdr);min-height:50px}
.pslot:last-child{border-bottom:none}
.pml{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:3px}
.pe{font-size:12px;color:var(--tx3);font-style:italic;cursor:pointer}
.pe:hover{color:var(--tx2)}
.pf{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.pm{font-size:12px;color:var(--tx);line-height:1.35;flex:1;cursor:pointer}
.pm:hover{color:var(--a)}
.pc{background:none;border:none;color:var(--tx3);font-size:13px;cursor:pointer;padding:0;flex-shrink:0;line-height:1}
.pc:hover{color:var(--tx2)}
/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.mod{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--bdr)}
.mt{font-size:15px;font-weight:600;color:var(--tx)}
.mx{background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;line-height:1}
.mb{padding:1rem 1.25rem}
.ml{max-height:260px;overflow-y:auto}
.mi{padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:14px;color:var(--tx);display:flex;align-items:center;gap:8px}
.mi:hover{background:var(--sur2)}
.mc{font-size:10px;color:var(--tx3);background:var(--sur2);padding:1px 6px;border-radius:8px}
.mft{padding:.75rem 1.25rem;border-top:1px solid var(--bdr);display:flex;gap:8px}
.mft input{flex:1}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
var RECIPES = [
  {id:"s1",name:"Chimichurri Chicken Thighs",category:"Dinner",rating:5,prepTime:"10 min",cookTime:"30 min",servings:"4",tags:"Latin",wantToTry:false,
   ingredients:[{qty:"8",name:"bone-in chicken thighs"},{qty:"1 cup",name:"fresh parsley, packed"},{qty:"4 cloves",name:"garlic"},{qty:"3 tbsp",name:"red wine vinegar"},{qty:"1/2 cup",name:"olive oil"},{qty:"1 tsp",name:"dried oregano"},{qty:"1/2 tsp",name:"red pepper flakes"},{qty:"1",name:"lemon, juiced"}],
   steps:["Blend parsley, garlic, vinegar, olive oil, oregano and red pepper flakes into chimichurri.","Marinate chicken in half the chimichurri for 30 min or overnight.","Bake at 425F for 28-32 min until golden and cooked through.","Drizzle remaining chimichurri over chicken before serving."],
   notes:"Incredible over rice or roasted potatoes. Overnight marinade makes a big difference. Ben loves extra sauce on the side."},
  {id:"s2",name:"Beef and Broccoli Stir Fry",category:"Dinner",rating:4,prepTime:"15 min",cookTime:"15 min",servings:"4",tags:"Asian",wantToTry:false,
   ingredients:[{qty:"1 lb",name:"flank steak, thinly sliced"},{qty:"4 cups",name:"broccoli florets"},{qty:"3 tbsp",name:"low-sodium soy sauce"},{qty:"1 tbsp",name:"oyster sauce"},{qty:"1 tbsp",name:"cornstarch"},{qty:"3 cloves",name:"garlic, minced"},{qty:"1 tsp",name:"fresh ginger, grated"},{qty:"2 tsp",name:"sesame oil"},{qty:"2 tbsp",name:"vegetable oil"}],
   steps:["Mix soy sauce, oyster sauce, cornstarch and sesame oil for sauce.","Toss beef in cornstarch, stir-fry in hot oil 2 min. Remove.","Stir-fry broccoli 3 min, add garlic and ginger 30 sec.","Return beef, pour sauce over, toss and cook 1 min until thickened."],
   notes:"Low-sodium soy keeps this weeknight-friendly. Great over jasmine rice."},
  {id:"s3",name:"Greek Lemon Chicken Soup",category:"Dinner",rating:5,prepTime:"10 min",cookTime:"35 min",servings:"6",tags:"Mediterranean",wantToTry:false,
   ingredients:[{qty:"1.5 lbs",name:"chicken breasts"},{qty:"8 cups",name:"low-sodium chicken broth"},{qty:"1/2 cup",name:"orzo pasta"},{qty:"3",name:"eggs"},{qty:"1/4 cup",name:"lemon juice"},{qty:"1",name:"onion, halved"},{qty:"2 stalks",name:"celery"},{qty:"1 tsp",name:"black pepper"},{qty:"2 tbsp",name:"fresh dill, chopped"}],
   steps:["Simmer chicken with onion, celery and pepper in broth 20 min. Remove and shred.","Strain broth back into pot, boil, cook orzo 8 min.","Whisk eggs and lemon juice, slowly ladle in a cup of hot broth while whisking.","Pour back into pot with chicken and dill. Do not boil after this."],
   notes:"Avgolemono! The egg-lemon technique creates a silky texture. Freeze without the orzo."},
  {id:"s4",name:"Pork Carnitas Tacos",category:"Dinner",rating:5,prepTime:"15 min",cookTime:"3 hrs",servings:"8",tags:"Latin",wantToTry:false,
   ingredients:[{qty:"3 lbs",name:"pork shoulder, cut into chunks"},{qty:"1",name:"orange, juiced and zested"},{qty:"1",name:"lime, juiced"},{qty:"4 cloves",name:"garlic"},{qty:"1 tsp",name:"cumin"},{qty:"1 tsp",name:"dried oregano"},{qty:"1 tsp",name:"chili powder"},{qty:"1/2 cup",name:"water"}],
   steps:["Combine all ingredients in a Dutch oven or slow cooker.","Cook at 325F covered 3 hrs, or slow cooker low 8 hrs.","Shred pork, spread on baking sheet with juices, broil 5 min until crispy.","Serve in warm tortillas with onion, cilantro, salsa and lime."],
   notes:"The broiling step is non-negotiable for the crispy edges. Freezes beautifully."},
  {id:"s5",name:"Turkey Meatball Soup",category:"Dinner",rating:4,prepTime:"20 min",cookTime:"30 min",servings:"6",tags:"Mediterranean",wantToTry:false,
   ingredients:[{qty:"1 lb",name:"ground turkey"},{qty:"1/4 cup",name:"breadcrumbs"},{qty:"1",name:"egg"},{qty:"2 cloves",name:"garlic, minced"},{qty:"1 tsp",name:"Italian seasoning"},{qty:"6 cups",name:"low-sodium chicken broth"},{qty:"2 cups",name:"spinach"},{qty:"1 can",name:"diced tomatoes, no salt added"},{qty:"1 cup",name:"small pasta"}],
   steps:["Mix turkey, breadcrumbs, egg, half garlic and seasoning. Roll into meatballs.","Brown meatballs in olive oil 2-3 min per side. Remove.","Saute remaining garlic, add broth and tomatoes, bring to simmer.","Add meatballs and pasta, cook 10 min. Stir in spinach until wilted."],
   notes:"Add a parmesan rind to the broth for extra depth."},
  {id:"s6",name:"Banana Bread",category:"Dessert",rating:5,prepTime:"10 min",cookTime:"55 min",servings:"8",tags:"Baking",wantToTry:false,
   ingredients:[{qty:"3",name:"very ripe bananas"},{qty:"1/3 cup",name:"melted butter"},{qty:"3/4 cup",name:"sugar"},{qty:"1",name:"egg, beaten"},{qty:"1 tsp",name:"vanilla"},{qty:"1 tsp",name:"baking soda"},{qty:"1.5 cups",name:"all-purpose flour"},{qty:"1/2 cup",name:"chocolate chips (optional)"}],
   steps:["Preheat oven to 350F. Mash bananas in a large bowl.","Mix in butter, then sugar, egg and vanilla.","Add baking soda, fold in flour until just combined. Add chocolate chips.","Pour into greased 4x8 loaf pan. Bake 55-65 min until toothpick comes out clean."],
   notes:"The blacker the bananas the better. I freeze overripe bananas for this."},
  {id:"s7",name:"Birria Tacos",category:"Dinner",rating:0,prepTime:"20 min",cookTime:"3.5 hrs",servings:"8",tags:"Latin",wantToTry:true,
   ingredients:[{qty:"3 lbs",name:"beef chuck or short ribs"},{qty:"5",name:"dried guajillo chiles"},{qty:"3",name:"dried ancho chiles"},{qty:"1",name:"chipotle in adobo"},{qty:"4 cloves",name:"garlic"},{qty:"1 tsp",name:"cumin"},{qty:"1 tsp",name:"dried oregano"},{qty:"1/2 tsp",name:"cinnamon"},{qty:"2 cups",name:"beef broth"}],
   steps:["Toast dried chiles 1 min, soak in hot water 20 min. Blend with garlic and spices.","Coat beef in chile paste, marinate 1 hr or overnight.","Braise beef with broth at 325F for 3 hrs until fall-apart tender.","Dip corn tortillas in consomme, fill with beef and cheese, griddle until crispy.","Serve with consomme for dipping, onion, cilantro and lime."],
   notes:"Want to try the dipping consomme technique - apparently that is the key step."},
  {id:"s8",name:"Korean Japchae Noodles",category:"Dinner",rating:0,prepTime:"20 min",cookTime:"20 min",servings:"4",tags:"Asian",wantToTry:true,
   ingredients:[{qty:"200g",name:"glass noodles (dangmyeon)"},{qty:"200g",name:"beef sirloin, thinly sliced"},{qty:"2",name:"carrots, julienned"},{qty:"1",name:"onion, sliced"},{qty:"2 cups",name:"spinach"},{qty:"4",name:"shiitake mushrooms"},{qty:"3 tbsp",name:"low-sodium soy sauce"},{qty:"2 tbsp",name:"sesame oil"},{qty:"1 tbsp",name:"sugar"}],
   steps:["Soak glass noodles in hot water 20 min, drain.","Season beef with soy sauce and garlic, stir-fry 2 min. Set aside.","Stir-fry each vegetable separately.","Toss noodles with soy sauce, sesame oil and sugar.","Combine everything, adjust seasoning, garnish with sesame seeds."],
   notes:"Looks doable for a weeknight if I prep the veg ahead."}
];

var DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var MEALS = ["Lunch","Dinner"];
var CATS = ["All","Dinner","Lunch","Dessert","Snack","Other","Want to Try"];

var S = {
  view:"list", recipes:[], shopItems:[], mealPlan:{},
  filter:"All", search:"", selected:null, editR:null,
  weekOff:0, modal:null, mSearch:"",
  urlLoading:false, urlMsg:"", urlOk:false,
  pasteLoading:false, pasteMsg:"", pasteOk:false
};

function loadData() {
  try { var r = localStorage.getItem("cb5_r"); S.recipes = r ? JSON.parse(r) : JSON.parse(JSON.stringify(RECIPES)); } catch(e) { S.recipes = JSON.parse(JSON.stringify(RECIPES)); }
  try { var s = localStorage.getItem("cb5_s"); S.shopItems = s ? JSON.parse(s) : []; } catch(e) { S.shopItems = []; }
  try { var m = localStorage.getItem("cb5_m"); S.mealPlan = m ? JSON.parse(m) : {}; } catch(e) { S.mealPlan = {}; }
  render();
}
function saveR() { try { localStorage.setItem("cb5_r", JSON.stringify(S.recipes)); } catch(e) {} }
function saveS() { try { localStorage.setItem("cb5_s", JSON.stringify(S.shopItems)); } catch(e) {} }

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function starsH(n) {

/* ---- WEEK ---- */
function getMon(off) {
  var d = new Date(); var dy = d.getDay(); var df = dy === 0 ? -6 : 1 - dy;
  d.setDate(d.getDate() + df + off * 7); d.setHours(0,0,0,0); return d;
}
function wKey(off) { return getMon(off).toISOString().slice(0,10); }
function wDates(off) {
  var m = getMon(off);
  return DAYS.map(function(_,i) { var d = new Date(m); d.setDate(d.getDate()+i); return d; });
}
function isToday(d) { var n = new Date(); return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear(); }
function slotK(off,di,ml) { return wKey(off)+"_"+di+"_"+ml; }
function getMeal(off,di,ml) { return S.mealPlan[slotK(off,di,ml)] || ""; }
function setMeal(off,di,ml,val) { S.mealPlan[slotK(off,di,ml)] = val; saveM(); }

/* ---- FILTER ---- */
function getFiltered() {
  return S.recipes.filter(function(r) {
    if (S.filter === "Want to Try") return !!r.wantToTry;
    var co = S.filter === "All" || r.category === S.filter;
    var q = S.search.toLowerCase();
    var so = !q || r.name.toLowerCase().indexOf(q) >= 0 || (r.tags||"").toLowerCase().indexOf(q) >= 0 || r.category.toLowerCase().indexOf(q) >= 0;
    return co && so;
  });
}

/* ---- URL IMPORT ---- */
function parseDur(iso) {
  if (!iso) return "";
  var m = iso.match(/PT?(?:(\d+)H)?(?:(\d+)M)?/i);
  if (!m) return iso.replace("PT","").replace("H"," hr").replace("M"," min").trim();
  var h = parseInt(m[1]||0), mn = parseInt(m[2]||0);
  if (h && mn) return h+" hr "+mn+" min";
  if (h) return h+" hr";
  if (mn) return mn+" min";
  return "";
}
function findSchema(data) {
  if (!data) return null;
  if (Array.isArray(data)) { for (var i=0;i<data.length;i++) { var r=findSchema(data[i]); if(r) return r; } return null; }
  if (data["@graph"]) return findSchema(data["@graph"]);
  var t = data["@type"];
  if (t === "Recipe" || (Array.isArray(t) && t.indexOf("Recipe") >= 0)) return data;
  return null;
}
function parseInst(inst) {
  if (!inst) return [];
  if (typeof inst === "string") return inst.split(/
+/).filter(function(s){return s.trim();}).map(function(s){return s.trim();});
  if (!Array.isArray(inst)) inst = [inst];
  var out = [];
  for (var i=0;i<inst.length;i++) {
    var x = inst[i];
    if (typeof x === "string") { out.push(x.trim()); }
    else if (x["@type"] === "HowToStep") { out.push((x.text||x.name||"").trim()); }
    else if (x["@type"] === "HowToSection") { var sub=parseInst(x.itemListElement); for(var j=0;j<sub.length;j++) out.push(sub[j]); }
    else { out.push((x.text||x.name||"").trim()); }
  }
  return out.filter(function(s){return s;});
}
function parseIngList(list) {
  if (!Array.isArray(list)) return [];
  return list.map(function(s) {
    var str = typeof s === "string" ? s : (s.name || String(s));
    var m = str.match(/^([\d\/\.¼½¾⅐-⅞\s]+(?:cup|tbsp|tsp|oz|lb|g|kg|ml|l|cloves?|medium|large|small|can|slice|bunch|sprig|pinch|dash)?s?\.?)\s+(.+)/i);
    if (m) return {qty: m[1].trim(), name: m[2].trim()};
    return {qty: "", name: str.trim()};
  }).filter(function(x){return x.name;});
}

function doURLImport() {
  var input = document.getElementById("url-input");
  var url = input ? input.value.trim() : "";
  if (!url) { alert("Please paste a recipe URL first."); return; }
  if (url.indexOf("http") !== 0) { alert("Please enter a full URL starting with https://"); return; }
  S.urlLoading = true; S.urlMsg = ""; render();
  var proxies = [
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    "https://corsproxy.io/?" + encodeURIComponent(url)
  ];
  tryProxy(proxies, 0);
}
function tryProxy(proxies, idx) {
  if (idx >= proxies.length) {
    S.urlLoading = false; S.urlOk = false;
    S.urlMsg = "Could not reach this page. Try pasting the recipe text instead.";
    render(); return;
  }
  var xhr = new XMLHttpRequest();
  xhr.open("GET", proxies[idx]);
  xhr.timeout = 12000;
  xhr.onload = function() {
    if (xhr.status === 200) { processHTML(xhr.responseText); }
    else { tryProxy(proxies, idx+1); }
  };
  xhr.onerror = xhr.ontimeout = function() { tryProxy(proxies, idx+1); };
  xhr.send();
}
function processHTML(html) {
  S.urlLoading = false;
  var parser = new DOMParser();
  var doc = parser.parseFromString(html, "text/html");
  var recipe = null;
  var scripts = doc.querySelectorAll('script[type="application/ld+json"]');
  for (var i=0; i<scripts.length; i++) {
    try { var data = JSON.parse(scripts[i].textContent); recipe = findSchema(data); if (recipe) break; } catch(e) {}
  }
  if (!recipe) {
    S.urlOk = false; S.urlMsg = "No recipe data found on this page. Try the paste option below instead.";
    render(); return;
  }
  if (recipe.name) S.editR.name = recipe.name;
  if (recipe.prepTime) S.editR.prepTime = parseDur(recipe.prepTime);
  if (recipe.cookTime) S.editR.cookTime = parseDur(recipe.cookTime||recipe.totalTime);
  var y = recipe.recipeYield;
  if (y) S.editR.servings = typeof y === "string" ? y.replace(/[^0-9\s]/g,"").trim() : (Array.isArray(y) ? String(y[0]) : "");
  var ings = parseIngList(recipe.recipeIngredient||[]);
  if (ings.length) S.editR.ingredients = ings;
  var stps = parseInst(recipe.recipeInstructions||[]);
  if (stps.length) S.editR.steps = stps;
  if (recipe.recipeCuisine) S.editR.tags = Array.isArray(recipe.recipeCuisine) ? recipe.recipeCuisine[0] : recipe.recipeCuisine;
  else if (recipe.keywords) S.editR.tags = typeof recipe.keywords === "string" ? recipe.keywords.split(",")[0].trim() : (recipe.keywords[0]||"");
  if (recipe.description) S.editR.notes = recipe.description.replace(/<[^>]+>/g,"").trim().slice(0,300);
  S.urlOk = true; S.urlMsg = "Recipe imported! Review the fields below.";
  render();
  setTimeout(function() { var el = document.getElementById("fn"); if (el) el.scrollIntoView({behavior:"smooth",block:"center"}); }, 100);
}

/* ---- PASTE IMPORT ---- */
function doPasteImport() {
  var input = document.getElementById("paste-input");
  var text = input ? input.value.trim() : "";
  if (!text) { alert("Please paste some recipe text first."); return; }
  S.pasteLoading = true; S.pasteMsg = ""; render();
  var body = JSON.stringify({
    model: "claude-sonnet-4-20250514",
    max_tokens: 1500,
    system: "You are a recipe parser. Extract recipe data from the provided text and return ONLY a valid JSON object with no markdown, no backticks, no extra text. Keys: name (string), prepTime (string e.g. 15 min), cookTime (string), servings (string), tags (string, one cuisine style), ingredients (array of {qty,name}), steps (array of strings). Use empty string or empty array if unknown. No null values.",
    messages: [{role:"user", content:"Parse this recipe:

" + text}]
  });
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://api.anthropic.com/v1/messages");
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.timeout = 30000;
  xhr.onload = function() {
    S.pasteLoading = false;
    try {
      var data = JSON.parse(xhr.responseText);
      var raw = data.content && data.content[0] ? data.content[0].text : "";
      var cleaned = raw.replace(/```json|```/g,"").trim();
      var parsed = JSON.parse(cleaned);
      if (parsed.name) S.editR.name = parsed.name;
      if (parsed.prepTime) S.editR.prepTime = parsed.prepTime;
      if (parsed.cookTime) S.editR.cookTime = parsed.cookTime;
      if (parsed.servings) S.editR.servings = String(parsed.servings);
      if (parsed.tags) S.editR.tags = parsed.tags;
      if (parsed.ingredients && parsed.ingredients.length) S.editR.ingredients = parsed.ingredients;
      if (parsed.steps && parsed.steps.length) S.editR.steps = parsed.steps;
      S.pasteOk = true; S.pasteMsg = "Parsed! Review the fields below and save when ready.";
    } catch(e) {
      S.pasteOk = false; S.pasteMsg = "Could not parse this text. Try tidying it up, or fill in manually.";
    }
    render();
    setTimeout(function() { var el = document.getElementById("fn"); if (el) el.scrollIntoView({behavior:"smooth",block:"center"}); }, 100);
  };
  xhr.onerror = xhr.ontimeout = function() {
    S.pasteLoading = false; S.pasteOk = false; S.pasteMsg = "Request failed. Check your internet connection.";
    render();
  };
  xhr.send(body);
}

function renderPlan() {
  var dates = wDates(S.weekOff); var mon = dates[0]; var sun = dates[6]; var h = "";
  var isCW = S.weekOff === 0;
  var rng = mon.toLocaleDateString("en-CA",{month:"long",day:"numeric"}) + " – " + sun.toLocaleDateString("en-CA",{month:"long",day:"numeric",year:"numeric"});

  h += '<div class="pnb"><button class="bg" style="padding:6px 10px;font-size:13px" onclick="shiftWeek(-1)"><i class="ti ti-chevron-left"></i></button>';
  if (!isCW) h += '<button class="bg" style="padding:6px 10px;font-size:13px" onclick="shiftWeek(0)">Today</button>';
  h += '<button class="bg" style="padding:6px 10px;font-size:13px" onclick="shiftWeek(1)"><i class="ti ti-chevron-right"></i></button></div></div>';
  h += '<div class="pgrid">';
  for (var i=0; i<dates.length; i++) {
    var d = dates[i]; var td = isToday(d);
    h += '<div class="pday' + (td?" td":"") + '"><div class="pdh"><div class="pdn">' + DAYS[i] + '</div><div class="pdd">' + d.getDate() + '</div></div>';
    for (var j=0; j<MEALS.length; j++) {
      var ml = MEALS[j]; var val = getMeal(S.weekOff, i, ml);
      h += '<div class="pslot"><div class="pml">' + ml + '</div>';
      if (val) {
        h += '<div class="pf"><span class="pm" onclick="openPicker(' + S.weekOff + ',' + i + ','' + ml + '')">' + esc(val) + '</span><button class="pc" onclick="clearMeal(' + S.weekOff + ',' + i + ','' + ml + '')"><i class="ti ti-x" style="font-size:12px"></i></button></div>';
      } else {
        h += '<div class="pe" onclick="openPicker(' + S.weekOff + ',' + i + ','' + ml + '')">+ Add</div>';
      }
      h += '</div>';
    }
    h += '</div>';
  }
  h += '</div>';
  h += '<p style="font-size:12px;color:var(--tx3);margin-top:.75rem;text-align:center">Click any slot to pick a recipe or type a custom meal</p>';
  return h;
}

function renderShop() {
  var pend = S.shopItems.filter(function(i){return !i.done;}); var done = S.shopItems.filter(function(i){return i.done;}); var h = "";
  h += '<div class="shdr"><div><div class="dtitle">Shopping list</div><div style="font-size:13px;color:var(--tx2);margin-top:3px">' + pend.length + ' item' + (pend.length!==1?"s":"") + ' to get &middot; ' + done.length + ' checked off</div></div>';
  if (done.length) h += '<button class="bg" onclick="clearDone()">Clear checked</button>';
  h += '</div>';
  h += '<div class="sadd"><input type="text" id="sinput" placeholder="Add item manually..." onkeydown="if(event.key==='Enter')addShopItem()"><button class="bp" onclick="addShopItem()">Add</button></div>';
  if (!pend.length && !done.length) {
    h += '<div class="empty"><i class="ti ti-shopping-cart"></i><div style="font-size:15px;font-weight:500">Your list is empty</div><div style="font-size:13px;margin-top:5px">Add items above or import from a recipe</div></div>';
  }
  if (pend.length) {
    h += '<div style="margin-bottom:1rem"><div class="sstitle">To get (' + pend.length + ')</div>';
    for (var i=0; i<pend.length; i++) {
      var it = pend[i];
      h += '<div class="si"><input type="checkbox" onchange="toggleShop('' + it.id + '')"><span class="si-t">' + esc(it.text) + '</span>' + (it.src?'<span class="si-s">'+esc(it.src)+'</span>':"") + '<button class="rmv" onclick="rmShopItem('' + it.id + '')"><i class="ti ti-x"></i></button></div>';
    }
    h += '</div>';
  }
  if (done.length) {
    h += '<hr class="sdiv"><div><div class="sstitle">Done (' + done.length + ')</div>';
    for (var i=0; i<done.length; i++) {
      var it = done[i];
      h += '<div class="si done"><input type="checkbox" checked onchange="toggleShop('' + it.id + '')"><span class="si-t">' + esc(it.text) + '</span>' + (it.src?'<span class="si-s">'+esc(it.src)+'</span>':"") + '<button class="rmv" onclick="rmShopItem('' + it.id + '')"><i class="ti ti-x"></i></button></div>';
    }
    h += '</div>';
  }
  h += '<div class="sipbox"><div class="slbl" style="margin-bottom:10px">Import ingredients from a recipe</div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap"><select id="srs" style="flex:1;min-width:160px"><option value="">Choose a recipe...</option>';
  for (var i=0; i<S.recipes.length; i++) h += '<option value="' + S.recipes[i].id + '">' + esc(S.recipes[i].name) + '</option>';
  h += '</select><button class="bg" onclick="importRecipe()"><i class="ti ti-download" style="font-size:14px"></i> Import</button></div></div>';
  return h;
}

function renderModal() {
  var off = S.modal.off; var di = S.modal.di; var meal = S.modal.meal;
  var q = S.mSearch.toLowerCase();
  var fl = S.recipes.filter(function(r){ return !q || r.name.toLowerCase().indexOf(q)>=0 || (r.tags||"").toLowerCase().indexOf(q)>=0; });
  var ds = wDates(off)[di].toLocaleDateString("en-CA",{weekday:"long",month:"short",day:"numeric"});
  var h = '<div class="ov" onclick="closeModalBg(event)">';
  h += '<div class="mod" onclick="event.stopPropagation()">';
  h += '<div class="mh"><div class="mt">' + meal + ' &middot; ' + ds + '</div><button class="mx" onclick="closeModal()"><i class="ti ti-x"></i></button></div>';
  h += '<div class="mb"><input type="text" style="margin-bottom:10px" placeholder="Search your recipes..." value="' + esc(S.mSearch) + '" oninput="mSearch(this.value)">';
  h += '<div class="ml">';
  if (!fl.length) { h += '<div style="padding:1rem;text-align:center;color:var(--tx3);font-size:13px">No matches</div>'; }
  else { for (var i=0; i<fl.length; i++) { h += '<div class="mi" onclick="pickMeal('' + esc(fl[i].name) + '')"> ' + esc(fl[i].name) + '<span class="mc">' + esc(fl[i].category) + '</span></div>'; } }
  h += '</div></div>';
  h += '<div class="mft"><input type="text" id="cmin" placeholder="Or type a custom meal..." onkeydown="if(event.key==='Enter')pickCustom()"><button class="bp" onclick="pickCustom()">Add</button></div>';
  h += '</div></div>';
  return h;
}

function bindStars() {
  var els = document.querySelectorAll("#spkr .sp");
  for (var i=0; i<els.length; i++) {
    (function(el) {
      el.addEventListener("click", function() {
        var v = parseInt(el.getAttribute("data-v"));
        document.getElementById("frt").value = v;
        var all = document.querySelectorAll("#spkr .sp");
        for (var j=0; j<all.length; j++) {
          if (j < v) all[j].classList.add("lit"); else all[j].classList.remove("lit");
        }
      });
    })(els[i]);
  }
}

/* ---- ACTIONS ---- */
function setView(v) { S.view = v; render(); }
function setCat(c) { S.filter = c; render(); }
function doSearch(v) { S.search = v; render(); }
function openRecipe(id) { S.selected = id; S.view = "detail"; render(); }
function shiftWeek(off) { S.weekOff = off === 0 ? 0 : S.weekOff + off; render(); }
function openPicker(off,di,meal) { S.modal = {off:off,di:di,meal:meal}; S.mSearch = ""; render(); setTimeout(function(){ var el=document.querySelector(".mb input"); if(el) el.focus(); },30); }
function closeModal() { S.modal = null; render(); }
function closeModalBg(ev) { if (ev.target.classList.contains("ov")) closeModal(); }
function mSearch(v) { S.mSearch = v; render(); }
function pickMeal(name) { if (!S.modal) return; setMeal(S.modal.off,S.modal.di,S.modal.meal,name); S.modal = null; render(); }
function pickCustom() { var el=document.getElementById("cmin"); if (el && el.value.trim()) pickMeal(el.value.trim()); }
function clearMeal(off,di,ml) { setMeal(off,di,ml,""); render(); }

function startAdd() {
  S.editR = {name:"",category:"Dinner",ingredients:[{qty:"",name:""}],steps:[""],rating:0,wantToTry:false};
  S.urlMsg = ""; S.urlOk = false; S.urlLoading = false;
  S.pasteMsg = ""; S.pasteOk = false; S.pasteLoading = false;
  S.view = "form"; render();
}
function startEdit(id) {
  for (var i=0;i<S.recipes.length;i++) { if (S.recipes[i].id===id) { S.editR = JSON.parse(JSON.stringify(S.recipes[i])); break; } }
  S.view = "form"; render();
}
function cancelForm() { S.view = S.editR && S.editR.id ? "detail" : "list"; render(); }
function markMade(id) {
  for (var i=0;i<S.recipes.length;i++) { if (S.recipes[i].id===id) { S.recipes[i].wantToTry=false; break; } }
  saveR(); render();
}

function collectForm() {
  var ings = []; var els = document.querySelectorAll("[data-iq]");
  for (var i=0;i<els.length;i++) { var nm=document.querySelector('[data-in="'+i+'"]'); if(nm&&nm.value.trim()) ings.push({qty:els[i].value.trim(),name:nm.value.trim()}); }
  var stps = []; var sels = document.querySelectorAll("[data-st]");
  for (var i=0;i<sels.length;i++) { if(sels[i].value.trim()) stps.push(sels[i].value.trim()); }
  var wt = document.getElementById("fwt");
  return {
    name: document.getElementById("fn").value.trim(),
    category: document.getElementById("fc").value,
    prepTime: document.getElementById("fp").value.trim(),
    cookTime: document.getElementById("fk").value.trim(),
    servings: document.getElementById("fsv").value.trim(),
    tags: document.getElementById("ftg").value.trim(),
    rating: parseInt(document.getElementById("frt").value)||0,
    wantToTry: wt ? wt.checked : false,
    ingredients: ings, steps: stps,
    notes: document.getElementById("fnt").value.trim()
  };
}
function saveForm() {
  var d = collectForm(); if (!d.name) { alert("Please enter a recipe name."); return; }
  if (S.editR.id) {
    for (var i=0;i<S.recipes.length;i++) { if (S.recipes[i].id===S.editR.id) { S.recipes[i]=Object.assign({},S.editR,d); break; } }
    S.selected = S.editR.id;
  } else {
    var nr = Object.assign({id:uid()},d); S.recipes.push(nr); S.selected = nr.id;
  }
  S.view = "detail"; saveR(); render();
}
function delR(id) {
  if (!confirm("Delete this recipe?")) return;
  S.recipes = S.recipes.filter(function(r){return r.id!==id;});
  S.view = "list"; S.selected = null; saveR(); render();
}

function addIng() {
  var d=collectForm(); S.editR=Object.assign({},S.editR,d); S.editR.ingredients.push({qty:"",name:""}); render();
}
function rmIng(i) {
  var d=collectForm(); S.editR=Object.assign({},S.editR,d); S.editR.ingredients.splice(i,1);
  if (!S.editR.ingredients.length) S.editR.ingredients.push({qty:"",name:""}); render();
}
function addStep() {
  var d=collectForm(); S.editR=Object.assign({},S.editR,d); S.editR.steps.push(""); render();
}
function rmStep(i) {
  var d=collectForm(); S.editR=Object.assign({},S.editR,d); S.editR.steps.splice(i,1);
  if (!S.editR.steps.length) S.editR.steps.push(""); render();
}

function addShopR(id) {
  var r=null; for(var i=0;i<S.recipes.length;i++){if(S.recipes[i].id===id){r=S.recipes[i];break;}}
  if (!r) return;
  var ings = r.ingredients||[];
  for (var i=0;i<ings.length;i++) { var t=[ings[i].qty,ings[i].name].filter(Boolean).join(" "); if(t) S.shopItems.push({id:uid(),text:t,done:false,src:r.name}); }
  saveS(); S.view="shop"; render();
}
function addShopItem() {
  var el=document.getElementById("sinput"); var v=el?el.value.trim():""; if(!v)return;
  S.shopItems.push({id:uid(),text:v,done:false}); el.value=""; saveS(); render();
}
function toggleShop(id) {
  for(var i=0;i<S.shopItems.length;i++){if(S.shopItems[i].id===id){S.shopItems[i].done=!S.shopItems[i].done;break;}}
  saveS(); render();
}
function rmShopItem(id) { S.shopItems=S.shopItems.filter(function(x){return x.id!==id;}); saveS(); render(); }
function clearDone() { S.shopItems=S.shopItems.filter(function(x){return !x.done;}); saveS(); render(); }
function importRecipe() { var el=document.getElementById("srs"); if(el&&el.value) addShopR(el.value); }

loadData();
</script>
</body>
</html>
