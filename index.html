<!DOCTYPE html>

<title>My Cookbook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf9f6;--sur:#fff;--sur2:#f4f2ed;--bdr:#e8e4dc;--bdr2:#d0ccc2;--tx:#1c1a17;--tx2:#6b6560;--tx3:#9c9690;--a:#BA7517;--al:#FAEEDA;--ad:#854F0B;--t:#0F6E56;--tl:#E1F5EE;--td:#085041;--p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;--r:10px;--rs:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1814;--sur:#232019;--sur2:#2c2820;--bdr:#3a352c;--bdr2:#4d4840;--tx:#f0ede6;--tx2:#a09890;--tx3:#6b6560;--a:#e8981a;--al:#3d2e0a;--ad:#f0b84a;--t:#1D9E75;--tl:#04342C;--td:#9FE1CB;--p:#7F77DD;--pl:#26215C;--pd:#CECBF6}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;min-height:100vh}
.app{max-width:880px;margin:0 auto;padding:0 1.25rem 3rem}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;border-bottom:1px solid var(--bdr);margin-bottom:1.25rem;gap:12px;flex-wrap:wrap}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo i{font-size:16px;color:#fff}
.at{font-size:17px;font-weight:600;color:var(--tx)}
.as{font-size:12px;color:var(--tx2)}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nb{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
.nb:hover,.nb.on{background:var(--sur2);color:var(--tx);border-color:var(--bdr2)}
.bdg{background:var(--a);color:#fff;font-size:10px;width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600}
input,select,textarea{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;font-size:14px;color:var(--tx);font-family:inherit;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--a)}
textarea{resize:vertical}
button{font-family:inherit;cursor:pointer}
.bp{background:var(--a);border:none;border-radius:var(--rs);padding:8px 18px;font-size:14px;color:#fff;font-weight:500;transition:background .15s}
.bp:hover{background:var(--ad)}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bg{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 14px;font-size:14px;color:var(--tx2);transition:background .15s}
.bg:hover{background:var(--sur2);color:var(--tx)}
.bt{background:var(--t);border:none;border-radius:var(--rs);padding:7px 14px;font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:5px}
.bt:hover{background:var(--td)}
.sb{display:flex;gap:8px;margin-bottom:.875rem}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.875rem}
.pill{background:transparent;border:1px solid var(--bdr);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--tx2);font-family:inherit;transition:all .15s}
.pill:hover{background:var(--sur2)}
.pill.on{background:var(--al);border-color:var(--a);color:var(--ad)}
.pill.try.on{background:var(--pl);border-color:var(--p);color:var(--pd)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--bdr2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.try{border-style:dashed}
.ctag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ad);background:var(--al);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:8px}
.ctag.try{color:var(--pd);background:var(--pl)}
.cn{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:6px;line-height:1.4}
.cm{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:8px}
.stars{color:var(--a)}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2)}
.empty i{font-size:42px;opacity:.25;display:block;margin-bottom:12px}
.back{background:transparent;border:none;cursor:pointer;color:var(--tx2);font-size:13px;display:flex;align-items:center;gap:5px;margin-bottom:1rem;padding:4px 0;font-family:inherit}
.back:hover{color:var(--tx)}
.dtt{font-size:22px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.3}
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;gap:12px}
.da{display:flex;gap:6px;flex-shrink:0}
.ib{background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:all .15s}
.ib:hover{background:var(--sur2)}
.ib.del:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.dm{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem}
.dmi{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:4px}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);margin-bottom:8px}
.dcols{display:grid;grid-template-columns:1fr 1.6fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:540px){.dcols{grid-template-columns:1fr}}
.ings{list-style:none}
.ings li{font-size:14px;padding:6px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.ings li:last-child{border-bottom:none}
.idot{width:5px;height:5px;border-radius:50%;background:var(--a);margin-top:5px;flex-shrink:0}
.sl{list-style:none}
.sl li{font-size:14px;padding:7px 0;border-bottom:1px solid var(--bdr);color:var(--tx);display:flex;gap:10px;line-height:1.55}
.sl li:last-child{border-bottom:none}
.sn{font-size:11px;font-weight:600;color:var(--ad);background:var(--al);min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0}
.nbox{background:var(--sur2);border-radius:var(--rs);padding:12px 14px;font-size:14px;color:var(--tx);line-height:1.65;margin-bottom:1rem;border-left:3px solid var(--a)}
.tbn{background:var(--pl);border-radius:var(--r);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tbn span{font-size:14px;color:var(--pd);display:flex;align-items:center;gap:7px}
.isec{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.ibox{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem 1.25rem}
.ibt{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.ibs{font-size:12px;color:var(--tx2);margin-bottom:9px}
.ir{display:flex;gap:8px}
.ir input{flex:1}
.imsg{margin-top:7px;font-size:13px;display:flex;align-items:center;gap:5px}
.imsg.ok{color:var(--t)}
.imsg.err{color:#c0392b}
.divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;color:var(--tx3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bdr)}
.fr{margin-bottom:1rem}
.fl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.fr textarea{height:80px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:480px){.f2,.f3{grid-template-columns:1fr}}
.ingrow{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ingrow input:first-child{max-width:100px}
.strow{display:flex;gap:6px;margin-bottom:6px;align-items:flex-start}
.strow textarea{height:64px;flex:1}
.rmv{background:transparent;border:1px solid var(--bdr);border-radius:6px;width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:all .15s}
.rmv:hover{background:#fff0f0;color:#c0392b;border-color:#f5c6c6}
.addb{background:transparent;border:1px dashed var(--bdr);border-radius:var(--rs);padding:7px 12px;font-size:13px;cursor:pointer;color:var(--tx2);width:100%;text-align:left;margin-top:4px;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.addb:hover{background:var(--sur2)}
.spkr{display:flex;gap:4px}
.sp{font-size:24px;cursor:pointer;color:var(--bdr2);transition:color .1s}
.sp.lit{color:var(--a)}
.fac{display:flex;gap:8px;justify-content:flex-end;padding-top:1rem;border-top:1px solid var(--bdr);margin-top:1rem}
.trow{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--pl);border-radius:var(--rs)}
.trow label{font-size:14px;color:var(--pd);font-weight:500;cursor:pointer}
.trow input[type=checkbox]{width:16px;height:16px;accent-color:var(--p);cursor:pointer;flex-shrink:0}
.shdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:12px}
.sadd{display:flex;gap:8px;margin-bottom:1rem}

.dhdr{font-size:12px;font-weight:600;color:var(--tx);padding:8px 0 4px;border-bottom:1px solid var(--bdr);margin-bottom:4px;margin-top:.875rem;display:flex;align-items:center;gap:6px}
.dhdr:first-of-type{margin-top:0}
.si{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--rs);transition:background .1s}

.si input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--a)}
.si-t{flex:1;font-size:14px;color:var(--tx)}

.si-s{font-size:11px;color:var(--tx3);white-space:nowrap}
.di-sel{background:transparent;border:none;font-size:11px;color:var(--tx2);cursor:pointer;font-family:inherit;padding:0;width:auto}
.sdiv{margin:1rem 0 .75rem;border:none;border-top:1px solid var(--bdr)}
.sipb{background:var(--sur2);border-radius:var(--r);padding:1rem;margin-top:1.25rem}
.act-bar{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--bdr);flex-wrap:wrap}
.act-btn{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 14px;font-size:13px;color:var(--tx);cursor:pointer;font-family:inherit;transition:all .15s}
.act-btn:hover{background:var(--sur2)}

.act-btn.discord:hover{background:#EEEFFE}
.pnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.pwl{font-size:16px;font-weight:600;color:var(--tx)}
.pws{font-size:12px;color:var(--tx2);margin-top:1px}
.pnb{display:flex;gap:6px}
.pgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}

.pday{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.pday.td{border-color:var(--a)}
.pdh{padding:7px 10px;border-bottom:1px solid var(--bdr)}
.pdn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2)}
.pdd{font-size:13px;font-weight:600;color:var(--tx)}
.pday.td .pdn{color:var(--ad)}
.pday.td .pdd{color:var(--a)}

.pslot:last-child{border-bottom:none}
.pml{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:3px}
.pe{font-size:12px;color:var(--tx3);font-style:italic;cursor:pointer}
.pe:hover{color:var(--tx2)}
.pf{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.pm{font-size:12px;color:var(--tx);line-height:1.35;flex:1;cursor:pointer}
.pm:hover{color:var(--a)}
.pc{background:none;border:none;color:var(--tx3);font-size:12px;cursor:pointer;padding:0;flex-shrink:0;line-height:1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.mod{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--bdr)}
.mt{font-size:15px;font-weight:600;color:var(--tx)}
.mx{background:none;border:none;font-size:20px;color:var(--tx2);cursor:pointer;line-height:1}
.mb{padding:1rem 1.25rem}
.ml{max-height:240px;overflow-y:auto}
.mi{padding:9px 10px;border-radius:var(--rs);cursor:pointer;font-size:14px;color:var(--tx);display:flex;align-items:center;gap:8px}
.mi:hover{background:var(--sur2)}
.mc{font-size:10px;color:var(--tx3);background:var(--sur2);padding:1px 6px;border-radius:8px}
.mft{padding:.75rem 1.25rem;border-top:1px solid var(--bdr);display:flex;gap:8px}
.mft input{flex:1}
.cfg-sec{margin-bottom:1.5rem}
.cfg-sec-t{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.cfg-sec-s{font-size:13px;color:var(--tx2);margin-bottom:9px}
.cfg-note{font-size:12px;color:var(--tx2);background:var(--sur2);border-radius:var(--rs);padding:10px 12px;margin-top:8px;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>

window.storage={
  get:function(k){return new Promise(function(res){try{var v=localStorage.getItem(k);res(v?{value:v,key:k}:null);}catch(e){res(null);}});},
  set:function(k,v){return new Promise(function(res){try{localStorage.setItem(k,v);res({value:v,key:k});}catch(e){res(null);}});},
  delete:function(k){return new Promise(function(res){try{localStorage.removeItem(k);res({deleted:true,key:k});}catch(e){res(null);}});}
};

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function stH(n){var h="<span class='stars'>";for(var i=1;i<=5;i++)h+=i<=n?"&#9733;":"&#9734;";return h+"</span>";}

function autoDept(n){
  n=(n||"").toLowerCase();
  if(/parsley|cilantro|dill|basil|mint|thyme|spinach|kale|lettuce|broccoli|cauliflower|celery|carrot|onion|shallot|garlic|ginger|pepper|tomato|cucumber|zucchini|squash|potato|mushroom|avocado|lime|lemon|orange|apple|banana|berry|mango|fresh herb/.test(n))return"Produce";
  if(/chicken|beef|pork|lamb|turkey|salmon|tuna|fish|shrimp|seafood|meat|steak|ground|sirloin|chuck|rib|sausage|bacon|ham/.test(n))return"Meat & Seafood";
  if(/milk|butter|cheese|egg|yogurt|cream|mozzarella|parmesan|cheddar|dairy/.test(n))return"Dairy & Eggs";
  if(/frozen/.test(n))return"Frozen";
  if(/bread|tortilla|wrap|roll|bun|pita|naan|bagel|bakery/.test(n))return"Bakery";
  if(/ketchup|mustard|mayo|hot sauce|worcestershire|oyster sauce|fish sauce|hoisin|dressing/.test(n))return"Condiments";
  if(/\bcan\b|canned|diced tomato|tomato sauce|tomato paste|\bbean|lentil|chickpea|jarred/.test(n))return"Canned & Jarred";
  if(/flour|sugar|salt|cumin|paprika|chili|cinnamon|spice|seasoning|rice|pasta|noodle|orzo|breadcrumb|cornstarch|baking|cocoa|chocolate|vanilla|oil|olive oil|sesame oil|vegetable oil|vinegar|soy sauce|broth|stock|coconut milk|honey|maple/.test(n))return"Pantry & Dry Goods";
  return"Other";
}

function fmtList(){
  var by={};DEPTS.forEach(function(d){by[d]=[];});
  S.sh.filter(function(i){return!i.done;}).forEach(function(it){if(!it.dept)it.dept=autoDept(it.text);(by[it.dept]||by["Other"]).push(it);});
  var lines=["Shopping List\n"];
  DEPTS.forEach(function(d){if(!by[d]||!by[d].length)return;lines.push("\n"+(DICONS[d]||"")+" "+d.toUpperCase());by[d].forEach(function(it){lines.push("- "+it.text);});});
  return lines.join("\n");
}

function toast(msg){
  var t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:#1c1a17;color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;z-index:9999;font-family:inherit;white-space:nowrap;pointer-events:none";
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(function(){t.remove();},400);},2200);
}

async function sendDiscord(){
  if(!S.cfg.discord){alert("Add a Discord webhook URL in Settings first.");return;}
  var pend=S.sh.filter(function(i){return!i.done;});
  if(!pend.length){alert("Shopping list is empty.");return;}
  try{
    var r=await fetch(S.cfg.discord,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:fmtList(),username:"My Cookbook"})});
    if(r.ok)toast("Sent to Discord!");
    else alert("Discord error. Check your webhook URL in Settings.");
  }catch(e){alert("Could not reach Discord: "+e.message);}
}

function openSMS(){
  var pend=S.sh.filter(function(i){return!i.done;});
  if(!pend.length){alert("Shopping list is empty.");return;}
  var text=fmtList();var phone=S.cfg.phone||"";
  if(navigator.clipboard){

      toast("Copied to clipboard!");
      if(phone)setTimeout(function(){window.location.href="sms:"+phone+"?body="+encodeURIComponent(text.slice(0,900));},400);
    });

    if(phone)window.location.href="sms:"+phone+"?body="+encodeURIComponent(text.slice(0,900));

}

function parseDur(s){
  if(!s)return"";var m=s.match(/PT?(?:(\d+)H)?(?:(\d+)M)?/i);
  if(!m)return s.replace(/PT/g,"").replace(/H/g," hr").replace(/M/g," min").trim();
  var h=parseInt(m[1]||0),mn=parseInt(m[2]||0);
  if(h&&mn)return h+" hr "+mn+" min";if(h)return h+" hr";if(mn)return mn+" min";return s;
}
function findSch(d){
  if(!d)return null;if(Array.isArray(d)){for(var i=0;i<d.length;i++){var r=findSch(d[i]);if(r)return r;}return null;}
  if(d["@graph"])return findSch(d["@graph"]);
  var t=d["@type"];if(t==="Recipe"||(Array.isArray(t)&&t.indexOf("Recipe")>=0))return d;return null;
}
function parseInst(x){
  if(!x)return[];if(typeof x==="string")return x.split(/\n+/).map(function(s){return s.trim();}).filter(Boolean);
  if(!Array.isArray(x))x=[x];var o=[];
  for(var i=0;i<x.length;i++){var v=x[i];if(typeof v==="string"){o.push(v.trim());}else if(v["@type"]==="HowToStep"){o.push((v.text||v.name||"").trim());}else if(v["@type"]==="HowToSection"){var sub=parseInst(v.itemListElement);for(var j=0;j<sub.length;j++)o.push(sub[j]);}else{o.push((v.text||v.name||"").trim());}}
  return o.filter(Boolean);
}
function parseIngs(list){
  if(!Array.isArray(list))return[];
  return list.map(function(s){var str=typeof s==="string"?s:(s.name||String(s));var m=str.match(/^([\d\/.]+\s*(?:cups?|tbsps?|tsps?|oz|lbs?|g|kg|ml|l|cloves?|medium|large|small|can|bunch|pinch)?)\s+(.+)/i);if(m)return{qty:m[1].trim(),name:m[2].trim()};return{qty:"",name:str.trim()};}).filter(function(x){return x.name;});
}
function doURL(){
  var inp=document.getElementById("ui");var url=inp?inp.value.trim():"";
  if(!url){alert("Please paste a URL first.");return;}
  S.ul=true;S.um="";rnd();
  tryP(["https://api.allorigins.win/raw?url="+encodeURIComponent(url),"https://corsproxy.io/?"+encodeURIComponent(url)],0);
}
function tryP(px,i){
  if(i>=px.length){S.ul=false;S.uo=false;S.um="Could not reach this page. Try filling in manually.";rnd();return;}
  var x=new XMLHttpRequest();x.open("GET",px[i]);x.timeout=12000;
  x.onload=function(){if(x.status===200){procH(x.responseText);}else{tryP(px,i+1);}};
  x.onerror=x.ontimeout=function(){tryP(px,i+1);};x.send();
}
function procH(html){
  S.ul=false;var dp=new DOMParser();var doc=dp.parseFromString(html,"text/html");var rc=null;
  var sc=doc.querySelectorAll('script[type="application/ld+json"]');
  for(var i=0;i<sc.length;i++){try{var d=JSON.parse(sc[i].textContent);rc=findSch(d);if(rc)break;}catch(e){}}
  if(!rc){S.uo=false;S.um="No recipe data found on this page. Try filling in manually.";rnd();return;}
  if(rc.name)S.er.name=rc.name;
  if(rc.prepTime)S.er.prepTime=parseDur(rc.prepTime);
  if(rc.cookTime||rc.totalTime)S.er.cookTime=parseDur(rc.cookTime||rc.totalTime);
  var y=rc.recipeYield;if(y)S.er.servings=typeof y==="string"?y.replace(/[^0-9\s]/g,"").trim():(Array.isArray(y)?String(y[0]):"");
  var ng=parseIngs(rc.recipeIngredient||[]);if(ng.length)S.er.ingredients=ng;
  var st=parseInst(rc.recipeInstructions||[]);if(st.length)S.er.steps=st;
  if(rc.recipeCuisine)S.er.tags=Array.isArray(rc.recipeCuisine)?rc.recipeCuisine[0]:rc.recipeCuisine;
  else if(rc.keywords)S.er.tags=typeof rc.keywords==="string"?rc.keywords.split(",")[0].trim():(rc.keywords[0]||"");
  if(rc.description)S.er.notes=rc.description.replace(/<[^>]+>/g,"").trim().slice(0,300);
  S.uo=true;S.um="Imported! Review and save below.";rnd();
}

function getMon(o){var d=new Date();var dy=d.getDay();d.setDate(d.getDate()+(dy===0?-6:1-dy)+o*7);d.setHours(0,0,0,0);return d;}
function wKey(o){return getMon(o).toISOString().slice(0,10);}
function wDates(o){var m=getMon(o);return DAYS.map(function(_,i){var d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function isToday(d){var n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function sk(o,di,ml){return wKey(o)+"_"+di+"_"+ml;}
function gM(o,di,ml){return S.pl[sk(o,di,ml)]||"";}
function sM(o,di,ml,v){S.pl[sk(o,di,ml)]=v;svP();}
function getFl(){
  return S.rr.filter(function(r){
    if(S.fil==="Want to Try")return!!r.wantToTry;
    var co=S.fil==="All"||r.category===S.fil;
    var q=S.srch.toLowerCase();
    return co&&(!q||r.name.toLowerCase().indexOf(q)>=0||(r.tags||"").toLowerCase().indexOf(q)>=0||r.category.toLowerCase().indexOf(q)>=0);
  });
}

      if(!by[d]||!by[d].length)return;
      h+='<div class="dhdr'+(first?' style="margin-top:0"':"")+'">'+(DICONS[d]||"")+" "+d+'</div>';first=false;
      by[d].forEach(function(it){
        h+='<div class="si"><input type="checkbox" onchange="tSh(''+it.id+'')">';
        h+='<span class="si-t">'+esc(it.text)+'</span>';
        if(it.src)h+='<span class="si-s">'+esc(it.src)+'</span>';
        h+='<select class="di-sel" onchange="setDept(''+it.id+'',this.value)">';
        DEPTS.forEach(function(dd){h+='<option value="'+dd+'"'+(it.dept===dd?' selected':"")+'>'+dd+'</option>';});
        h+='</select><button class="rmv" onclick="rSh(''+it.id+'')"><i class="ti ti-x"></i></button></div>';
      });
    });
  }
  if(done.length){
    h+='<hr class="sdiv"><div style="margin-bottom:1rem"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2);margin-bottom:6px">Done ('+done.length+')</div>';
    for(var i=0;i<done.length;i++){var it=done[i];h+='<div class="si done"><input type="checkbox" checked onchange="tSh(''+it.id+'')" ><span class="si-t">'+esc(it.text)+'</span>'+(it.src?'<span class="si-s">'+esc(it.src)+'</span>':"")+'<button class="rmv" onclick="rSh(''+it.id+'')"><i class="ti ti-x"></i></button></div>';}
    h+='</div>';
  }
  h+='<div class="sipb"><div class="slbl" style="margin-bottom:8px">Import from a recipe</div><div style="display:flex;gap:8px;flex-wrap:wrap"><select id="srs" style="flex:1;min-width:150px"><option value="">Choose a recipe...</option>';
  for(var i=0;i<S.rr.length;i++)h+='<option value="'+S.rr[i].id+'">'+esc(S.rr[i].name)+'</option>';
  h+='</select><button class="bg" onclick="iSh()"><i class="ti ti-download" style="font-size:14px"></i> Import</button></div></div>';
  if(pend.length){
    h+='<div class="act-bar">';
    h+='<button class="act-btn" onclick="openSMS()"><i class="ti ti-message"></i> Text'+(S.cfg.phone?"":" (set # in Settings)")+'</button>';
    h+='<button class="act-btn discord" onclick="sendDiscord()"><i class="ti ti-brand-discord"></i> Discord</button>';
    h+='<button class="act-btn" onclick="copyNotion()"><i class="ti ti-clipboard-text"></i> Copy for Notion</button>';
    h+='</div>';
  }
  return h;
}

function vPlan(){
  var dd=wDates(S.wo);var isCW=S.wo===0;var h="";
  var rng=dd[0].toLocaleDateString("en-CA",{month:"long",day:"numeric"})+" \u2013 "+dd[6].toLocaleDateString("en-CA",{month:"long",day:"numeric",year:"numeric"});
  h+='<div class="pnav"><div><div class="pwl">'+(isCW?"This week":"Week of "+dd[0].toLocaleDateString("en-CA",{month:"short",day:"numeric"}))+'</div><div class="pws">'+rng+'</div></div>';
  h+='<div class="pnb"><button class="bg" style="padding:6px 10px" onclick="shW(-1)"><i class="ti ti-chevron-left"></i></button>'+(isCW?"":'<button class="bg" style="padding:6px 10px;font-size:12px" onclick="shW(0)">Today</button>')+'<button class="bg" style="padding:6px 10px" onclick="shW(1)"><i class="ti ti-chevron-right"></i></button></div></div>';
  h+='<div class="pgrid">';
  for(var i=0;i<dd.length;i++){
    var d=dd[i];var td=isToday(d);
    h+='<div class="pday'+(td?" td":"")+'"><div class="pdh"><div class="pdn">'+DAYS[i]+'</div><div class="pdd">'+d.getDate()+'</div></div>';
    for(var j=0;j<MEALS.length;j++){
      var ml=MEALS[j];var val=gM(S.wo,i,ml);
      h+='<div class="pslot"><div class="pml">'+ml+'</div>';
      if(val)h+='<div class="pf"><span class="pm" onclick="oP('+S.wo+','+i+',''+ml+'')">'+esc(val)+'</span><button class="pc" onclick="cM('+S.wo+','+i+',''+ml+'')"><i class="ti ti-x" style="font-size:11px"></i></button></div>';
      else h+='<div class="pe" onclick="oP('+S.wo+','+i+',''+ml+'')">+ Add</div>';
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div><p style="font-size:12px;color:var(--tx3);margin-top:.75rem;text-align:center">Click any slot to pick a recipe or type a custom meal</p>';
  return h;
}

function vCfg(){
  var h='<div class="dtt" style="margin-bottom:1.25rem">Settings</div>';
  h+='<div class="cfg-sec"><div class="cfg-sec-t"><i class="ti ti-brand-discord"></i> Discord webhook</div>';
  h+='<div class="cfg-sec-s">Paste a webhook URL to send your shopping list directly to a Discord channel.</div>';
  h+='<input type="url" id="cfg-dc" placeholder="https://discord.com/api/webhooks/..." value="'+esc(S.cfg.discord||"")+'">';
  h+='<div class="cfg-note"><strong>How to get a webhook URL:</strong> In Discord, right-click a channel &rarr; Edit Channel &rarr; Integrations &rarr; Webhooks &rarr; New Webhook &rarr; Copy Webhook URL. Paste it above.</div></div>';
  h+='<div class="cfg-sec"><div class="cfg-sec-t"><i class="ti ti-message"></i> Phone number for texting</div>';
  h+='<div class="cfg-sec-s">Enter the number to pre-fill when you tap Text (include country code).</div>';
  h+='<input type="tel" id="cfg-ph" placeholder="+16139261234" value="'+esc(S.cfg.phone||"")+'"></div>';
  h+='<div class="cfg-sec"><div class="cfg-sec-t"><i class="ti ti-clipboard-text"></i> Notion</div>';
  h+='<div class="cfg-sec-s">The Notion API doesn't support direct browser requests. Use the "Copy for Notion" button on the shopping list to copy a formatted list you can paste in. For automatic page creation, use Claude.ai &mdash; Claude has Notion connected and can create pages for you in chat.</div></div>';
  h+='<button class="bp" onclick="saveCfg()">Save settings</button>';
  return h;
}

function vMod(){
  var o=S.mo.off;var di=S.mo.di;var ml=S.mo.meal;var q=S.ms.toLowerCase();
  var fl=S.rr.filter(function(r){return!q||r.name.toLowerCase().indexOf(q)>=0||(r.tags||"").toLowerCase().indexOf(q)>=0;});
  var ds=wDates(o)[di].toLocaleDateString("en-CA",{weekday:"long",month:"short",day:"numeric"});
  var h='<div class="ov" onclick="cMBg(event)"><div class="mod"><div class="mh"><div class="mt">'+ml+' &middot; '+ds+'</div><button class="mx" onclick="cMod()"><i class="ti ti-x"></i></button></div>';
  h+='<div class="mb"><input type="text" style="margin-bottom:9px" placeholder="Search your recipes..." value="'+esc(S.ms)+'" oninput="mSr(this.value)">';
  h+='<div class="ml">'+(fl.length?fl.map(function(r){return'<div class="mi" onclick="pM(''+esc(r.name)+'')">'+esc(r.name)+'<span class="mc">'+esc(r.category)+'</span></div>';}).join(''):'<div style="padding:1rem;text-align:center;color:var(--tx3);font-size:13px">No matches</div>')+'</div></div>';
  h+='<div class="mft"><input type="text" id="cm" placeholder="Or type a custom meal..." onkeydown="if(event.key==='Enter')pC()"><button class="bp" onclick="pC()">Add</button></div></div></div>';
  return h;
}

function bStars(){
  var els=document.querySelectorAll("#spkr .sp");
  for(var i=0;i<els.length;i++){(function(el){el.addEventListener("click",function(){var v=parseInt(el.getAttribute("data-v"));document.getElementById("frt").value=v;var all=document.querySelectorAll("#spkr .sp");for(var j=0;j<all.length;j++){if(j<v)all[j].classList.add("lit");else all[j].classList.remove("lit");}});})(els[i]);}
}

function sv(v){S.v=v;rnd();}
function sCat(c){S.fil=c;rnd();}
function dSr(v){S.srch=v;rnd();}
function oR(id){S.sel=id;S.v="detail";rnd();}
function shW(o){S.wo=o===0?0:S.wo+o;rnd();}
function oP(o,di,ml){S.mo={off:o,di:di,meal:ml};S.ms="";rnd();setTimeout(function(){var el=document.querySelector(".mb input");if(el)el.focus();},30);}
function cMod(){S.mo=null;rnd();}
function cMBg(ev){if(ev.target.classList.contains("ov"))cMod();}
function mSr(v){S.ms=v;rnd();}
function pM(n){if(!S.mo)return;sM(S.mo.off,S.mo.di,S.mo.meal,n);S.mo=null;rnd();}
function pC(){var el=document.getElementById("cm");if(el&&el.value.trim())pM(el.value.trim());}
function cM(o,di,ml){sM(o,di,ml,"");rnd();}
function saveCfg(){S.cfg.discord=(document.getElementById("cfg-dc")||{}).value||"";S.cfg.phone=(document.getElementById("cfg-ph")||{}).value||"";svC();toast("Settings saved!");}
function setDept(id,dept){for(var i=0;i<S.sh.length;i++){if(S.sh[i].id===id){S.sh[i].dept=dept;break;}}svS();rnd();}
function sAdd(){S.er={name:"",category:"Dinner",ingredients:[{qty:"",name:""}],steps:[""],rating:0,wantToTry:false};S.ul=false;S.um="";S.uo=false;S.v="form";rnd();}
function sEdit(id){for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===id){S.er=JSON.parse(JSON.stringify(S.rr[i]));break;}}S.v="form";rnd();}
function cF(){S.v=S.er&&S.er.id?"detail":"list";rnd();}
function mMade(id){for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===id){S.rr[i].wantToTry=false;break;}}svR();rnd();}
function colf(){
  var ng=[];var iq=document.querySelectorAll("[data-iq]");
  for(var i=0;i<iq.length;i++){var nm=document.querySelector('[data-in="'+i+'"]');if(nm&&nm.value.trim())ng.push({qty:iq[i].value.trim(),name:nm.value.trim()});}
  var st=[];var sq=document.querySelectorAll("[data-st]");
  for(var i=0;i<sq.length;i++){if(sq[i].value.trim())st.push(sq[i].value.trim());}
  var wt=document.getElementById("fwt");
  return{name:document.getElementById("fn").value.trim(),category:document.getElementById("fc").value,prepTime:document.getElementById("fp").value.trim(),cookTime:document.getElementById("fk").value.trim(),servings:document.getElementById("fsv").value.trim(),tags:document.getElementById("ftg").value.trim(),rating:parseInt(document.getElementById("frt").value)||0,wantToTry:wt?wt.checked:false,ingredients:ng,steps:st,notes:document.getElementById("fnt").value.trim()};
}
function svF(){
  var d=colf();if(!d.name){alert("Please enter a recipe name.");return;}
  if(S.er.id){for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===S.er.id){S.rr[i]=Object.assign({},S.er,d);break;}}S.sel=S.er.id;}
  else{var nr=Object.assign({id:uid()},d);S.rr.push(nr);S.sel=nr.id;}
  S.v="detail";svR();rnd();
}
function dR(id){if(!confirm("Delete this recipe?"))return;S.rr=S.rr.filter(function(r){return r.id!==id;});S.v="list";S.sel=null;svR();rnd();}
function aI(){var d=colf();S.er=Object.assign({},S.er,d);S.er.ingredients.push({qty:"",name:""});rnd();}
function rI(i){var d=colf();S.er=Object.assign({},S.er,d);S.er.ingredients.splice(i,1);if(!S.er.ingredients.length)S.er.ingredients.push({qty:"",name:""});rnd();}
function aS(){var d=colf();S.er=Object.assign({},S.er,d);S.er.steps.push("");rnd();}
function rS(i){var d=colf();S.er=Object.assign({},S.er,d);S.er.steps.splice(i,1);if(!S.er.steps.length)S.er.steps.push("");rnd();}
function aSR(id){
  var r=null;for(var i=0;i<S.rr.length;i++){if(S.rr[i].id===id){r=S.rr[i];break;}}if(!r)return;
  var ng=r.ingredients||[];for(var i=0;i<ng.length;i++){var t=[ng[i].qty,ng[i].name].filter(Boolean).join(" ");if(t)S.sh.push({id:uid(),text:t,done:false,src:r.name,dept:autoDept(ng[i].name)});}
  svS();S.v="shop";rnd();
}
function aSI(){var el=document.getElementById("si2");var v=el?el.value.trim():"";if(!v)return;S.sh.push({id:uid(),text:v,done:false,dept:autoDept(v)});el.value="";svS();rnd();}
function tSh(id){for(var i=0;i<S.sh.length;i++){if(S.sh[i].id===id){S.sh[i].done=!S.sh[i].done;break;}}svS();rnd();}
function rSh(id){S.sh=S.sh.filter(function(x){return x.id!==id;});svS();rnd();}
function cDone(){S.sh=S.sh.filter(function(x){return!x.done;});svS();rnd();}
function iSh(){var el=document.getElementById("srs");if(el&&el.value)aSR(el.value);}

ini();
</script>
</body>
</html>
